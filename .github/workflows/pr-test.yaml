name: Kyverno PR Test
on:
  pull_request:
    branches: [ "master" ]

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Kyverno CLI
      run: |
        curl -LO https://github.com/kyverno/kyverno/releases/download/v1.11.0/kyverno-cli_v1.11.0_linux_x86_64.tar.gz
        tar -xvf kyverno-cli_v1.11.0_linux_x86_64.tar.gz
        sudo cp kyverno /usr/local/bin/

    - name: Run Kyverno Test
      run: |
        echo "Testing manifests against baseline policies..."
        kyverno apply ./baseline-policies/ -r ./app-manifests/ --detailed-results
